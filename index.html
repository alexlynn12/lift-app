<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>Just Lift</title>
<meta name="theme-color" content="#fafaf8" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/favicon-32.png" type="image/png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Just Lift" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<main id="app"></main>

<nav id="tabbar" class="tabbar">
  <button class="tab" data-route="home">
    <span class="tab-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 11.5 12 4l8 7.5"/>
        <path d="M6 10v9.5a1 1 0 0 0 1 1h3v-6a2 2 0 0 1 4 0v6h3a1 1 0 0 0 1-1V10"/>
      </svg>
    </span>
    <span class="tab-label">Home</span>
  </button>
  <button class="tab" data-route="history">
    <span class="tab-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="13" r="8"/>
        <path d="M12 8.5V13l3 2"/>
        <path d="M9 2.5h6"/>
      </svg>
    </span>
    <span class="tab-label">History</span>
  </button>
  <button class="tab" data-route="analytics">
    <span class="tab-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 20.5h16"/>
        <path d="M6 16.5v-4"/>
        <path d="M10.5 16.5v-8"/>
        <path d="M15 16.5v-5.5"/>
        <path d="M19.5 16.5v-10"/>
      </svg>
    </span>
    <span class="tab-label">Analytics</span>
  </button>
  <button class="tab" data-route="settings">
    <span class="tab-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="6.5" x2="20" y2="6.5"/>
        <circle cx="9.5" cy="6.5" r="2"/>
        <line x1="4" y1="12.5" x2="20" y2="12.5"/>
        <circle cx="15" cy="12.5" r="2"/>
        <line x1="4" y1="18.5" x2="20" y2="18.5"/>
        <circle cx="10.5" cy="18.5" r="2"/>
      </svg>
    </span>
    <span class="tab-label">Settings</span>
  </button>
</nav>

<div id="rest-timer-bar" class="rest-timer-bar hidden">
  <button class="rest-timer-adjust" id="rest-minus">−15</button>
  <div class="rest-timer-mid">
    <div class="rest-timer-count" id="rest-timer-count">2:00</div>
    <div class="rest-timer-track"><div class="rest-timer-fill" id="rest-timer-fill"></div></div>
  </div>
  <button class="rest-timer-adjust" id="rest-plus">+15</button>
  <button class="rest-timer-skip" id="rest-skip">Skip</button>
</div>

<div id="toast" class="toast"></div>

<div id="set-type-overlay" class="confirm-overlay hidden">
  <div class="confirm-card">
    <div class="confirm-title">Set type</div>
    <div class="menu-list" id="set-type-actions">
      <button class="menu-item" data-type="normal"><span>Normal set</span></button>
      <button class="menu-item" data-type="warmup"><span>Warm-up set</span></button>
      <button class="menu-item" data-type="drop"><span>Drop set</span></button>
      <button class="menu-item" data-type="failure"><span>To failure</span></button>
      <button class="menu-item menu-item-danger" data-type="remove"><span>Remove set</span></button>
    </div>
    <button class="confirm-btn confirm-btn-cancel" id="set-type-close" style="margin-top:14px;">Cancel</button>
  </div>
</div>

<div id="plate-overlay" class="confirm-overlay hidden">
  <div class="confirm-card plate-card">
    <div class="confirm-title">Plate calculator</div>
    <div class="plate-weight-row">
      <input type="number" step="0.5" id="plate-weight-input" class="plate-weight-input" inputmode="decimal" />
      <span class="muted" id="plate-unit">lb</span>
    </div>
    <div id="plate-visual" class="plate-visual"></div>
    <div id="plate-readout" class="plate-readout"></div>
    <button class="confirm-btn confirm-btn-cancel" id="plate-close" style="margin-top:14px;">Close</button>
  </div>
</div>

<div id="exercise-picker" class="picker-overlay hidden">
  <div class="picker-handle"></div>
  <div class="picker-topbar">
    <button class="back-btn" id="picker-close">Cancel</button>
    <span class="picker-title" id="picker-title">Add exercise</span>
    <span style="width:46px;"></span>
  </div>
  <div class="picker-search-row" id="picker-search-row">
    <input type="text" id="picker-search" placeholder="Search exercises" />
  </div>
  <div class="picker-filter-row" id="picker-filter-row">
    <select id="picker-filter-muscle"></select>
    <select id="picker-filter-equipment"></select>
  </div>
  <div class="picker-create-row" id="picker-create-row">
    <button class="picker-create-btn" data-action="open-create-exercise">+ Can&rsquo;t find it? Create a new exercise</button>
  </div>
  <div class="picker-body" id="picker-body">
    <div class="picker-list" id="picker-list"></div>
    <div class="picker-index" id="picker-index"></div>
  </div>
  <div class="picker-create-body hidden" id="picker-create-body"></div>
</div>

<div id="new-exercise-modal" class="picker-overlay hidden">
  <div class="picker-handle"></div>
  <div class="picker-topbar">
    <button class="back-btn" id="new-exercise-cancel">Cancel</button>
    <span class="picker-title">New exercise</span>
    <span style="width:46px;"></span>
  </div>
  <div class="picker-create-body" id="new-exercise-body"></div>
</div>

<div id="confirm-overlay" class="confirm-overlay hidden">
  <div class="confirm-card" id="confirm-card">
    <div class="confirm-title" id="confirm-title"></div>
    <div class="confirm-message" id="confirm-message"></div>
    <div class="confirm-actions">
      <button class="confirm-btn confirm-btn-cancel" id="confirm-cancel">Cancel</button>
      <button class="confirm-btn confirm-btn-ok" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>

<div id="exercise-menu-overlay" class="confirm-overlay hidden">
  <div class="confirm-card" id="exercise-menu-card">
    <div class="confirm-title">Exercise options</div>
    <div class="menu-list" id="exercise-menu-actions">
      <button class="menu-item" data-action="menu-add-note">
        <span class="menu-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h4.2L19 9.2l-4.2-4.2L4 15.8V20Z"/><path d="M13.3 6.3l4.2 4.2"/></svg>
        </span>
        <span>Add note (RPE, rep range, etc.)</span>
      </button>
      <button class="menu-item menu-item-warmup" data-action="menu-add-warmup">
        <span class="menu-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c4 0 6-2.5 6-6.5 0-3-1.8-5-3-7 0 2-1 3-2 3-.5-2.5.5-5-1-8-3 3-5 6-5 9.5C7 19 8.5 22 12 22Z"/></svg>
        </span>
        <span>Add warmup set</span>
      </button>
      <button class="menu-item menu-item-workout-only" data-action="menu-add-ramp">
        <span class="menu-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16"/><path d="M4 20 20 6"/><path d="M9 20v-4M13 20v-8M17 20v-12"/></svg>
        </span>
        <span>Add warm-up ramp</span>
      </button>
      <button class="menu-item menu-item-workout-only" data-action="menu-superset">
        <span class="menu-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 6h8a3 3 0 0 1 0 6H7"/><path d="M10 3 7 6l3 3"/><path d="M17 18H9a3 3 0 0 1 0-6h8"/><path d="M14 21l3-3-3-3"/></svg>
        </span>
        <span>Superset with next</span>
      </button>
      <button class="menu-item menu-item-workout-only" data-action="menu-replace">
        <span class="menu-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2.1 21 6l-4 3.9"/><path d="M3 12v-1a4 4 0 0 1 4-4h14"/><path d="M7 21.9 3 18l4-3.9"/><path d="M21 12v1a4 4 0 0 1-4 4H3"/></svg>
        </span>
        <span>Replace exercise</span>
      </button>
    </div>
    <div class="menu-note-form hidden" id="menu-note-form">
      <textarea class="menu-note-input" id="menu-note-input" rows="2" placeholder="e.g. RPE 7-8 | 8-10 reps"></textarea>
      <button class="btn btn-primary btn-sm" id="menu-note-save" style="width:100%; margin-top:10px;">Save note</button>
    </div>
    <button class="confirm-btn confirm-btn-cancel" id="exercise-menu-close" style="margin-top:14px; width:100%;">Close</button>
  </div>
</div>

<script src="db.js"></script>
<script src="exercises-data.js"></script>
<script src="program-seed.js"></script>
<script src="program-plan.js"></script>
<script src="app.js"></script>
</body>
</html>
